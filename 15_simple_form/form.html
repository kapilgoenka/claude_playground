<!-- Create a form with fields for name and email, followed by a submit button. -->

<!-- use React and any other complementary technologies. The prime focus is on styling; it needs to look gorgeous and absolutely beautiful, with a modern design using darker themes. Use rounded corners wherever possible. -->

<!-- the form looks good. Make it a little bigger so that it takes up more of the page. -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07070f;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(124, 58, 237, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(59, 130, 246, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 55% 85%, rgba(236, 72, 153, 0.10) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    .card {
      width: 560px;
      background: rgba(255, 255, 255, 0.035);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 28px;
      padding: 64px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 40px 80px rgba(0, 0, 0, 0.6),
        0 0 100px rgba(124, 58, 237, 0.07);
      position: relative;
      overflow: hidden;
    }

    /* Top shimmer line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167, 113, 255, 0.7), transparent);
    }

    /* Subtle inner glow at top-left */
    .card::after {
      content: '';
      position: absolute;
      top: -60px;
      left: -40px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .header {
      margin-bottom: 36px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(167, 139, 250, 0.9);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #a78bfa;
      box-shadow: 0 0 6px #a78bfa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      color: #f0eeff;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.35);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      margin: 28px 0;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.45);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.2);
      pointer-events: none;
      transition: color 0.25s ease;
      display: flex;
      align-items: center;
    }

    .input-wrapper:focus-within .input-icon {
      color: rgba(167, 139, 250, 0.75);
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 16px 16px 16px 46px;
      color: rgba(255, 255, 255, 0.92);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.18);
    }

    input:focus {
      border-color: rgba(124, 58, 237, 0.55);
      background: rgba(124, 58, 237, 0.07);
      box-shadow:
        0 0 0 3px rgba(124, 58, 237, 0.13),
        0 0 24px rgba(124, 58, 237, 0.08);
    }

    .error-msg {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(252, 129, 129, 0.85);
      font-size: 12px;
      margin-top: 7px;
      padding-left: 2px;
    }

    .btn {
      width: 100%;
      padding: 17px 20px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow:
        0 1px 1px rgba(255,255,255,0.12) inset,
        0 6px 24px rgba(124, 58, 237, 0.45),
        0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 60%);
      opacity: 0;
      transition: opacity 0.2s ease;
      border-radius: inherit;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow:
        0 1px 1px rgba(255,255,255,0.12) inset,
        0 10px 32px rgba(124, 58, 237, 0.55),
        0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .btn:hover:not(:disabled)::before { opacity: 1; }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success state */
    .success-card {
      text-align: center;
      padding: 12px 0;
    }

    .success-icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.2);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-card h2 {
      color: #f0eeff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 10px;
    }

    .success-card p {
      color: rgba(255, 255, 255, 0.38);
      font-size: 14px;
      line-height: 1.6;
    }

    .success-card em {
      font-style: normal;
      color: rgba(167, 139, 250, 0.8);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const UserIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    );

    const MailIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
      </svg>
    );

    const ErrorIcon = () => (
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    );

    const ArrowIcon = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    );

    function Form() {
      const [values, setValues]   = useState({ name: '', email: '' });
      const [errors, setErrors]   = useState({});
      const [loading, setLoading] = useState(false);
      const [done, setDone]       = useState(false);

      const validate = () => {
        const e = {};
        if (!values.name.trim())  e.name  = 'Please enter your name';
        if (!values.email.trim()) e.email = 'Please enter your email';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(values.email))
          e.email = 'Enter a valid email address';
        return e;
      };

      const handleChange = ({ target: { name, value } }) => {
        setValues(v => ({ ...v, [name]: value }));
        setErrors(e => ({ ...e, [name]: '' }));
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setLoading(true);
        await new Promise(r => setTimeout(r, 1200));
        setLoading(false);
        setDone(true);
      };

      if (done) return (
        <div className="card">
          <div className="success-card">
            <div className="success-icon-wrap">✦</div>
            <h2>Message received!</h2>
            <p>
              Thanks, <em>{values.name}</em>.<br />
              We'll reach you at <em>{values.email}</em>.
            </p>
          </div>
        </div>
      );

      return (
        <div className="card">
          <div className="header">
            <div className="badge">
              <span className="badge-dot" />
              Now accepting messages
            </div>
            <h1>Get in touch</h1>
            <p className="subtitle">We'd love to hear from you.<br />Drop us a line below.</p>
          </div>

          <div className="divider" />

          <form onSubmit={handleSubmit} noValidate>
            <div className="field">
              <label htmlFor="name">Full name</label>
              <div className="input-wrapper">
                <span className="input-icon"><UserIcon /></span>
                <input
                  id="name" name="name" type="text"
                  placeholder="Jane Smith"
                  value={values.name}
                  onChange={handleChange}
                  autoComplete="name"
                />
              </div>
              {errors.name && (
                <p className="error-msg"><ErrorIcon />{errors.name}</p>
              )}
            </div>

            <div className="field">
              <label htmlFor="email">Email address</label>
              <div className="input-wrapper">
                <span className="input-icon"><MailIcon /></span>
                <input
                  id="email" name="email" type="email"
                  placeholder="jane@example.com"
                  value={values.email}
                  onChange={handleChange}
                  autoComplete="email"
                />
              </div>
              {errors.email && (
                <p className="error-msg"><ErrorIcon />{errors.email}</p>
              )}
            </div>

            <button className="btn" type="submit" disabled={loading}>
              <span className="btn-inner">
                {loading
                  ? <><span className="spinner" />Sending…</>
                  : <>Send message <ArrowIcon /></>
                }
              </span>
            </button>
          </form>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Form />);
  </script>
</body>
</html>
